name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build APK with Docker
      run: |
        docker run --rm -v $(pwd):/app -w /app -e BUILDOZER_WARN_ON_ROOT=0 kivy/buildozer:latest buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        retention-days: 30
        
    - name: Download URL
      run: |
        echo "🎉 APK will be available in the Actions tab!"
